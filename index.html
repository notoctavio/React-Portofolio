    <!-- 2. Blocking Preflight Script -->
    <script>
      (function() {
        // Theme Detection
        try {
          const theme = localStorage.getItem('theme');
          const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          const isDark = theme === 'dark' || (!theme && systemDark);
          if (isDark) document.documentElement.classList.add('dark');
          else document.documentElement.classList.remove('dark');
        } catch (e) {}

        // Reveal Logic
        function reveal() {
          document.documentElement.classList.remove('reveal-hidden');
          document.documentElement.classList.add('reveal-show');
        }

        // Wait for fonts to be ready
        if (document.fonts && document.fonts.load) {
          Promise.all([
            document.fonts.load('700 1em "Gabarito Variable"'),
            document.fonts.load('700 1em "Be Vietnam Pro"'),
            document.fonts.load('500 1em "Be Vietnam Pro"'),
            document.fonts.load('400 1em "Be Vietnam Pro"')
          ]).then(reveal).catch(reveal);
          
          // Longer fallback timeout
          setTimeout(reveal, 1000);
        } else {
          reveal();
        }
      })();
    </script>

    <style>
      .reveal-hidden {
        visibility: hidden !important;
        opacity: 0 !important;
      }
      .reveal-show {
        visibility: visible !important;
        opacity: 1 !important;
        transition: opacity 0.3s ease-in !important;
      }
      
      html { background-color: #fafafa; }
      html.dark { background-color: #0a0a0a; }
      body { background-color: inherit; }
